# AssemblyKit — Assembly Manifest v2
# Generated before any code is written.
# Records every component decision so assembly can be traced end-to-end.

manifest_version: "2.0"
assembly_id: asm-2026-001
product: demo-crm
feature: "Stale Company Dashboard Card"
created_at: "2026-05-05T14:05:00Z"
profile: fort-knox

request: >
  "Add a dashboard card showing companies with more than 10 employees
  and no updates in 30 days."

principle: reuse before manufacture

# ── Pinned components ──────────────────────────────────────────────────────────
#
# Each component is locked to an exact version at manifest time.
# decision: reuse | adapt | manufacture
# trust_level reflects the trust at time of selection.

pinned_components:

  - id: company.list
    version: "1.0.0"
    source: local
    trust_level: verified
    selection_score: 85
    decision: reuse
    reason: "Existing data component returns all companies. No changes needed."

  - id: employee.count_by_company
    version: "1.0.0"
    source: local
    trust_level: verified
    selection_score: 85
    decision: reuse
    reason: "Existing data component returns employee count via withCount(). No changes needed."

  - id: company.stale_filter
    version: "1.0.0"
    source: local
    trust_level: manufactured
    selection_score: 78
    decision: manufacture
    reason: >
      No local component combines staleness and employee-count filtering.
      Registry candidate (generic.stale_record_detector) covers timestamp
      filtering but not the employee threshold — domain-specific delta
      requires manufacture.
    manufacturing_target: app/Services/StaleCompanyFilter.php
    registry_candidate: "generic.stale_record_detector@2.1.1"
    registry_note: >
      Under fort-knox profile, 2.1.1 is the preferred registry candidate
      (score 94, certified, security patched). MVP chose local manufacture.
      See registry_enhanced_plan.

  - id: dashboard.card
    version: "1.1.0"
    source: local
    trust_level: verified
    selection_score: 90
    decision: reuse
    reason: "Existing UI component renders any labelled stat card. No changes needed."

# ── Assembly plan ──────────────────────────────────────────────────────────────

assembly:

  - step: 1
    action: reuse
    component: company.list
    produces: companies

  - step: 2
    action: reuse
    component: employee.count_by_company
    for_each: company in companies
    produces: companies_with_counts

  - step: 3
    action: manufacture
    component: company.stale_filter
    inputs:
      companies:          companies_with_counts
      stale_days:         30
      min_employee_count: 10
    produces: stale_companies

  - step: 4
    action: reuse
    component: dashboard.card
    inputs:
      label: "Companies needing attention"
      value: "{{ count(stale_companies) }}"
      sub:   "Not updated in 30+ days · 10+ employees"
    produces: rendered_card

# ── Quality obligations ────────────────────────────────────────────────────────

quality:
  tests:
    - id: stale_company_with_many_employees_is_shown
      file: tests/Feature/StaleCompanyDashboardTest.php
    - id: recent_company_with_many_employees_is_not_shown
      file: tests/Feature/StaleCompanyDashboardTest.php
    - id: stale_company_with_few_employees_is_not_shown
      file: tests/Feature/StaleCompanyDashboardTest.php
    - id: dashboard_shows_needing_attention_section
      file: tests/Feature/StaleCompanyDashboardTest.php
    - id: dashboard_excludes_recent_companies_from_attention_section
      file: tests/Feature/StaleCompanyDashboardTest.php

# ── Metrics ────────────────────────────────────────────────────────────────────

metrics:
  reused_count:       3
  adapted_count:      0
  manufactured_count: 1
  reuse_ratio:        "75%"

# ── Registry-enhanced plan (fort-knox profile) ────────────────────────────────

registry_enhanced_plan:
  profile: fort-knox
  selected_registry_component: "generic.stale_record_detector@2.1.1"
  selection_reason: >
    Highest selection score (94) among active, certified, security-reviewed
    components. 2.1.0 is recalled (CVE-DEMO-2026-001). 1.2.0 and 3.0.0-beta
    are rejected by fort-knox — no security review.
  components:
    - id: company.list
      version: "1.0.0"
      source: local
      decision: reuse
    - id: employee.count_by_company
      version: "1.0.0"
      source: local
      decision: reuse
    - id: generic.stale_record_detector
      version: "2.1.1"
      source: registry
      decision: reuse
      reason: "Covers timestamp filtering. Employee-count threshold applied at assembly level."
    - id: dashboard.card
      version: "1.1.0"
      source: local
      decision: reuse
  metrics:
    reused_count:       4
    adapted_count:      0
    manufactured_count: 0
    reuse_ratio:        "100%"
  note: >
    MVP implementation uses locally manufactured company.stale_filter.
    This plan records the supply chain target state once the registry is live.
