# AssemblyKit — Verified Component Registry
# Cross-project shared components with quality gates.
#
# trust_level: verified | experimental
# status:      active | recalled
# profiles:    fort-knox | high-scale | rapid-prototype → preferred | acceptable | rejected

version: "2.0"
source: registry
registry: assemblykit-registry.demo

components:

  # ── generic.stale_record_detector — four versions ───────────────────────────
  #
  # Filters any list of records to those older than a staleness threshold.
  # Four versions available. Select based on your trust profile.

  - id: generic.stale_record_detector
    version: "1.2.0"
    kind: logic
    status: active
    trust_level: experimental
    selection_score: 61
    signature: demo-signed
    description: >
      Filters any list of records by timestamp staleness. Fast and lightweight.
      Not security-reviewed. Suitable for prototyping.
    quality:
      verification: experimental
      tests: 12
      benchmark: "p95 < 8ms for 10k records"
      security: not reviewed
    strengths:
      - Lightweight and fast cold start
      - Easy to integrate
    known_limitations:
      - Timestamp parsing has edge cases with non-UTC timezones
      - No security review completed
      - Minimal test coverage
    profiles:
      fort-knox:       rejected
      high-scale:      acceptable
      rapid-prototype: preferred

  - id: generic.stale_record_detector
    version: "2.1.0"
    kind: logic
    status: recalled
    trust_level: experimental
    selection_score: 0
    signature: demo-signed
    recall:
      cve: CVE-DEMO-2026-001
      severity: high
      reason: "Security vulnerability in timestamp parsing allows timezone-based bypass of staleness threshold."
      replacement: "generic.stale_record_detector@2.1.1"
    description: >
      RECALLED. Previously certified. Security vulnerability discovered in
      timestamp parsing — CVE-DEMO-2026-001. Replace with 2.1.1 immediately.
    quality:
      verification: certified
      tests: 24
      benchmark: "p95 < 10ms for 10k records"
      security: reviewed (vulnerability found — see recall)
    known_limitations:
      - "RECALLED: CVE-DEMO-2026-001 — security vulnerability in timestamp parsing"
    profiles:
      fort-knox:       rejected
      high-scale:      rejected
      rapid-prototype: rejected

  - id: generic.stale_record_detector
    version: "2.1.1"
    kind: logic
    status: active
    trust_level: verified
    selection_score: 94
    signature: demo-signed
    description: >
      Patched replacement for 2.1.0. Fixes CVE-DEMO-2026-001. Certified,
      security-reviewed, drop-in replacement with no API changes.
    quality:
      verification: certified
      tests: 26
      benchmark: "p95 < 10ms for 10k records"
      security: reviewed and patched
    strengths:
      - Drop-in replacement for 2.1.0 — no code changes required
      - Highest trust level available
      - Security patch verified by independent audit
    known_limitations:
      - Slightly conservative timestamp handling vs 1.2.0
    profiles:
      fort-knox:       preferred
      high-scale:      acceptable
      rapid-prototype: acceptable

  - id: generic.stale_record_detector
    version: "3.0.0-beta"
    kind: logic
    status: active
    trust_level: experimental
    selection_score: 72
    signature: unsigned
    description: >
      Next-generation stale record detector. Fastest available. Supports
      multiple timestamp fields and configurable precision. Beta API —
      breaking changes expected before 3.0.0 stable.
    quality:
      verification: experimental
      tests: 31
      benchmark: "p95 < 5ms for 10k records"
      security: not reviewed
    strengths:
      - Fastest available — 2x faster than 2.1.1
      - Highest test count of any version
      - Multi-field timestamp support
    known_limitations:
      - Beta API — breaking changes before stable release
      - No security review
      - Not recommended for production
    profiles:
      fort-knox:       rejected
      high-scale:      "preferred (warn: beta API, no security review)"
      rapid-prototype: preferred
