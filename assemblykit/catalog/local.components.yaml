# AssemblyKit — Local Component Catalog
# Describes the functional capabilities of demo-crm.
#
# kind:        data | logic | ui
# status:      existing | missing
# trust_level: verified | manufactured | experimental | legacy
# signature:   demo-signed | unsigned

version: "2.0"
source: local
project: demo-crm

components:

  # ── Data components ─────────────────────────────────────────────────────────

  - id: company.list
    kind: data
    version: "1.0.0"
    status: existing
    trust_level: verified
    selection_score: 85
    signature: demo-signed
    description: Returns all companies in the CRM.
    inputs: []
    outputs:
      - name: companies
        type: list<Company>
    effects:
      reads:    [companies]
      writes:   []
      external: []
    implementation: app/Models/Company.php
    quality:
      tests: 2
      test_file: tests/Feature/ExampleTest.php

  - id: company.get
    kind: data
    version: "1.0.0"
    status: existing
    trust_level: verified
    selection_score: 85
    signature: demo-signed
    description: Returns a single company by ID.
    inputs:
      - name: company_id
        type: integer
        required: true
    outputs:
      - name: company
        type: Company
    effects:
      reads:    [companies]
      writes:   []
      external: []
    implementation: app/Models/Company.php

  - id: employee.count_by_company
    kind: data
    version: "1.0.0"
    status: existing
    trust_level: verified
    selection_score: 85
    signature: demo-signed
    description: Returns the number of employees belonging to a given company.
    inputs:
      - name: company
        type: Company
        required: true
    outputs:
      - name: count
        type: integer
    effects:
      reads:    [employees]
      writes:   []
      external: []
    implementation: app/Models/Company.php

  # ── UI components ────────────────────────────────────────────────────────────

  - id: dashboard.card
    kind: ui
    version: "1.1.0"
    status: existing
    trust_level: verified
    selection_score: 90
    signature: demo-signed
    description: Displays a labelled stat card on any dashboard page.
    inputs:
      - name: label
        type: string
        required: true
      - name: value
        type: string|integer
        required: true
      - name: sub
        type: string
        required: false
    outputs:
      - name: rendered_card
        type: html
    effects:
      reads:    []
      writes:   []
      external: []
    implementation: resources/views/components/dashboard-card.blade.php
    quality:
      tests: 1
      test_file: tests/Feature/ExampleTest.php

  # ── Logic components ─────────────────────────────────────────────────────────

  - id: company.stale_filter
    kind: logic
    version: "1.0.0"
    status: existing
    trust_level: manufactured
    selection_score: 78
    signature: unsigned
    description: >
      Filters a list of companies down to those that have not been updated
      within a given number of days and optionally meet a minimum employee count.
    inputs:
      - name: companies
        type: list<Company>
        required: true
      - name: stale_days
        type: integer
        required: true
      - name: min_employee_count
        type: integer
        required: false
        default: 0
    outputs:
      - name: stale_companies
        type: list<Company>
    effects:
      reads:    []
      writes:   []
      external: []
    implementation: app/Services/StaleCompanyFilter.php
    quality:
      tests: 5
      test_file: tests/Feature/StaleCompanyDashboardTest.php
    promotion_path:
      current_level: manufactured
      next_level: verified
      required:
        - tests >= 10 (currently 5)
        - security review completed
        - benchmark documented
        - signature: demo-signed
      to_reach_certified:
        - all verified requirements
        - external audit
        - registry submission approved
